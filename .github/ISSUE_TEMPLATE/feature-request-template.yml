name: Feature request
description: Suggest an idea to improve this project.
title: "[Feature]: "
labels:
  - enhancement
  - needs triage
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Please describe the problem and proposed solution clearly.

  - type: textarea
    id: problem_statement
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain point or current limitation.
      placeholder: I am frustrated when ...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the feature or improvement you want.
      placeholder: It would be great if ...
    validations:
      required: true

  - type: textarea
    id: alternatives_considered
    attributes:
      label: Alternatives considered
      description: Describe other options or workarounds you considered.

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add links, references, screenshots, or examples.
