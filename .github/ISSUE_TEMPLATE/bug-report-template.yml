name: Bug report
description: Something is not working as expected.
title: "[Bug]: "
labels:
  - bug
  - needs triage
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for opening a bug report.
        Please fill all required sections so we can reproduce the problem.

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear and concise description of the issue.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: List exact steps so we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node.js version, and package manager.
      placeholder: Ubuntu 24.04, Chrome 136, Node 22, pnpm 10

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste console or server logs.
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Screenshots, links, and any extra details.
