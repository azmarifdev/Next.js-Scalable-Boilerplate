name: Package Manager Consistency

on:
  pull_request:
    branches:
      - "**"
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/package-manager-consistency.yml"
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/package-manager-consistency.yml"
  workflow_dispatch:

concurrency:
  group: package-manager-consistency-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pnpm-lockfile:
    name: pnpm lockfile check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install via pnpm
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify pnpm-lock.yaml is unchanged
        run: git diff --exit-code -- pnpm-lock.yaml
