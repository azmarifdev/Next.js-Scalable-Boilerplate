name: PR Auto Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: pr-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  pr-automerge:
    if: |
      github.actor != 'dependabot[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Guarded merge strategy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -f .github/scripts/guarded-pr-merge.sh
          chmod +x .github/scripts/guarded-pr-merge.sh
          bash .github/scripts/guarded-pr-merge.sh "${{ github.event.pull_request.html_url }}"
