name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      prs_created: ${{ steps.release.outputs.prs_created }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: false
          skip-github-release: false

      - name: Enhance release notes
        if: steps.release.outputs.release_created == 'true'
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG_NAME;

            if (!tag) {
              core.warning("No tag_name output found from release-please; skipping release enhancement.");
              return;
            }

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag
            });

            const existingBody = release.body || "";

            // Build compare URL for full changelog and contributor extraction.
            const releases = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100
            });
            const sorted = releases.data
              .filter((r) => !r.draft && !r.prerelease)
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            const currentIndex = sorted.findIndex((r) => r.tag_name === tag);
            const prev = currentIndex > 0 ? sorted[currentIndex - 1] : null;

            let contributors = [];
            let fullChangelogUrl = `https://github.com/${owner}/${repo}/commits/${tag}`;

            if (prev) {
              fullChangelogUrl = `https://github.com/${owner}/${repo}/compare/${prev.tag_name}...${tag}`;
              try {
                const compare = await github.rest.repos.compareCommits({
                  owner,
                  repo,
                  base: prev.tag_name,
                  head: tag
                });
                const seen = new Set();
                for (const commit of compare.data.commits) {
                  const login = commit.author?.login;
                  if (!login || seen.has(login)) continue;
                  seen.add(login);
                  contributors.push(login);
                }
              } catch (e) {
                core.warning(`Could not compute contributor list: ${e.message}`);
              }
            }

            const creditsSection = [
              "## Credits",
              "",
              "Huge thanks to everyone who contributed to this release.",
              "",
              `[Full Changelog](${fullChangelogUrl})`
            ].join("\n");

            const contributorsSection = [
              "## Contributors",
              "",
              ...(contributors.length
                ? contributors.map((login) => `- @${login}`)
                : ["- No external contributors detected for this release window."])
            ].join("\n");

            const metadataSection = [
              "## Release Metadata",
              "",
              `- Tag: \`${tag}\``,
              `- Commit: \`${release.target_commitish}\``,
              `- Generated by: Release Please`
            ].join("\n");

            const sectionsToAppend = [creditsSection, contributorsSection, metadataSection].join("\n\n");
            const hasCredits = existingBody.includes("## Credits");
            const hasContributors = existingBody.includes("## Contributors");
            const hasMetadata = existingBody.includes("## Release Metadata");

            let nextBody = existingBody;
            if (!hasCredits || !hasContributors || !hasMetadata) {
              nextBody = [existingBody.trim(), sectionsToAppend].filter(Boolean).join("\n\n");
            }

            // Keep release title exactly as the tag.
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              name: tag,
              body: nextBody
            });

      - name: Release summary
        if: always()
        run: |
          echo "release_created=${{ steps.release.outputs.release_created }}" >> "$GITHUB_STEP_SUMMARY"
          echo "prs_created=${{ steps.release.outputs.prs_created }}" >> "$GITHUB_STEP_SUMMARY"
